###
### Display
###
# Verbose program output
verbose = "debug"


###
### Runtime
###
# Number of threads to utilize.
# Defaults to number of cores available to the system if omitted.
#threads = 2


###
### Requests
###
# User agent to send with each request
user_agent = "curl/7.71.1"

# Website timeout from connect to response finished
timeout = 20

# Maximum number of allowed redirects -- set to 0 because redirect itself typically means "found"!
max_redirects = 0

# Maximum number of retries per request -- default is 3 but this can cause random errors to occur during the check
max_retries = 10

# Comma-separated list of accepted status codes for valid links.
# Omit to accept all response types.
accept = ["200..=299", "301", "302"]    # 301 Moved Permanently, 302 Found

# Proceed for server connections considered insecure (invalid TLS)
insecure = false

# Only test links with the given scheme (e.g. https)
# Omit to check links with any scheme
#scheme = "https"

# Request method
method = "get"

# Rate-limit sensitive hosts
max_concurrency = 3
host_request_interval = "1s"


###
### Exclusions
###
# Exclude URLs from checking (supports regex)
# GNU is included here because it very frequently hits rate limits, even with very conservative internal/retry values and lychee's cache enabled
exclude = [".git/.*", "http://www.gnu.org/licenses/", "https://www.gnu.org/licenses/", "http://www.gnu.org/licenses/gpl-2.0.html", "https://www.gnu.org/licenses/old-licenses/gpl-2.0.en.html"]

# Exclude input paths from checking (supports glob).
# The Sphinx/Jinja2 HTML templates contain unrendered `{{ pathto(...) }}`
# expressions that are only resolved at doc build time. Checking the raw
# template source reports these as broken local files, so skip it.
exclude_path = ["doc/htmldoc/templates"]

# Exclude URLs contained in a file from checking
# If a file named `.lycheeignore` exists in the current working directory,
# its contents will be excluded as well.
#exclude_file = []

# Exclude all private IPs from checking
# Equivalent to setting `exclude_private`, `exclude_link_local`, and `exclude_loopback` to true
exclude_all_private = true

# Exclude private IP address ranges from checking
exclude_private = true

# Exclude link-local IP address range from checking
exclude_link_local = true

# Exclude loopback IP address range and localhost from checking
exclude_loopback = true

# Exclude all mail addresses from checking
include_mail = false
