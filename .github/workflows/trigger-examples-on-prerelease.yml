#
# Pre-release examples check and downstream trigger
#
# Triggered automatically when a GitHub pre-release is published (release: prereleased).
# In that case the workflow YAML is read from the default branch (main), but the
# repository is checked out at the tagged commit — which lives on MAJOR.MINOR_develop.
#
# To run manually against a pre-release branch before tagging (semi-manual testing):
#
#   gh workflow run "Pre-release examples check" --ref MAJOR.MINOR_develop
#
# Or with an explicit previous tag when auto-detection would not find the right one:
#
#   gh workflow run "Pre-release examples check" --ref MAJOR.MINOR_develop \
#     -f previous_tag=vMAJOR.MINOR
#
# The branch can also be selected from the GitHub UI:
#   Actions → Pre-release examples check → Run workflow → select branch
#
# Checks (all must pass before dispatch fires):
#   1. Registry sync — check_examples_registry.py: every .py file registered; no orphaned entries
#   2. Change check  — prerelease_check.py: changed/new files have last_change updated
#   3. Field check   — prerelease_check.py: all entries have required fields non-empty
#   4. Path check    — prerelease_check.py: helper_scripts and data_files paths exist on disk
#
# If any check fails, the workflow exits with a summary of what needs fixing.
# Update examples.yml, commit, and re-run.
#
# Authentication (in order of preference):
#   1. GitHub App   — configure vars.APP_ID and secrets.APP_PRIVATE_KEY; the App must be
#                     installed on nest/nest-simulator-examples with contents:write or
#                     actions:write permission.
#   2. PAT fallback — secrets.API_TOKEN_GITHUB with repo scope (used automatically if
#                     the GitHub App secrets are not set).
#
name: "Pre-release examples check"

on:
  workflow_dispatch:
    inputs:
      previous_tag:
        description: "Previous stable release tag (e.g. vMAJOR.MINOR). Auto-detected if omitted."
        required: false
        default: ""
  release:
    types: [prereleased]

run-name: Pre-release examples check for ${{ github.ref_name }}

jobs:
  check-and-dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
          disable-telemetry: true

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v4.2.2
        with:
          fetch-depth: 0  # full history required for git diff across tags

      - name: Resolve previous stable release tag
        id: prev_tag
        run: |
          # Use manual input if provided (workflow_dispatch), otherwise auto-detect.
          PREV="${{ inputs.previous_tag }}"
          if [ -z "$PREV" ]; then
            PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+$' | head -1)
          fi
          if [ -z "$PREV" ]; then
            echo "ERROR: Could not determine previous stable release tag." >&2
            echo "Pass it explicitly via the 'previous_tag' input." >&2
            exit 1
          fi
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"
          echo "Previous stable release : $PREV"
          echo "Current ref             : ${{ github.ref_name }}"

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: "Check 1: Registry sync — all files registered, no orphaned entries"
        run: python .github/scripts/check_examples_registry.py --examples-dir pynest/examples

      - name: "Checks 2-4: Changed files, required fields, and paths"
        run: |
          python .github/scripts/prerelease_check.py \
            --examples-dir pynest/examples \
            --previous-tag ${{ steps.prev_tag.outputs.tag }}

      - name: Generate GitHub App token
        id: app-token
        # Only runs when the GitHub App is configured; skipped silently otherwise.
        if: vars.APP_ID != ''
        continue-on-error: true
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "nest-simulator-examples"

      - name: Trigger downstream workflow in nest-simulator-examples
        env:
          TAG: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          # Prefer the short-lived GitHub App token; fall back to PAT if not configured.
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.API_TOKEN_GITHUB }}
        run: |
          payload=$(jq -n \
            --arg tag    "$TAG" \
            --arg run_id "$RUN_ID" \
            --arg actor  "$ACTOR" \
            '{
               event_type: "pre-release-sync",
               client_payload: {
                 tag:          $tag,
                 source_repo:  "nest/nest-simulator",
                 source_run_id: $run_id,
                 triggered_by: $actor
               }
             }')
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --fail-with-body \
            https://api.github.com/repos/nest/nest-simulator-examples/dispatches \
            -d "$payload"
