[build-system]
requires = ["scikit-build-core",
    "cython>=0.28.3",
    "setuptools>=61",
    "wheel"
    ]
build-backend = "scikit_build_core.build"


[project]
name = "nest-simulator"
dynamic = ["version"]
description = "NEST is a simulator for spiking neural network models that focuses on the dynamics, size and structure of neural systems rather than on the exact morphology of individual neurons."
keywords = ["nest", "simulator", "neuroscience", "neural", "neuron", "network", "ai", "spike", "spiking"]
readme = "README.md"
license.file = "LICENSE"
authors = [
  { name = "NEST Initiative", email = "users@nest-simulator.org" },
]
maintainers = [
  { name = "Steffen Graber", email = "s.graber@fz-juelich.de" },
]
requires-python = ">=3.9, <4.0"
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: GNU General Public License v2 (GPLv2)",
  "Operating System :: POSIX :: Linux",
  "Operating System :: MacOS",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: C++",
  "Topic :: Scientific/Engineering",
  "Topic :: Scientific/Engineering :: Medical Science Apps.",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Typing :: Typed",
]
dependencies = [
  "cython >= 0.28.3",
  "numpy",
  "matplotlib"
]

[project.optional-dependencies]
server = [
  "Flask",
  "flask-cors",
  "gunicorn",
  "requests",
  "RestrictedPython"
]
test = [
  "pytest",
  "pytest-cov",
  "pytest-xdist",
  "flake8",
  "black",
  "isort",
  "mypy",
  "scipy",
  "pandas"
]
docs = [
  "sphinx >= 6.2.1",
  "sphinx_rtd_theme",
  "sphinx_autobuild",
  "sphinx_gallery",
  "sphinx-tabs",
  "sphinx_design",
  "sphinx-material",
  "sphinx-copybutton",
  "sphinx-carousel",
  "sphinx-notfound-page",
  "sphinxcontrib-mermaid",
  "sphinxcontrib-plantuml",
  "nbsphinx",
  "numpydoc",
  "example",
  "Image",
  "breathe",
  "csvkit",
  "docutils",
  "PyYAML >= 4.2b1",
  "tqdm",
  "yamllint"
]
examples = [
  "networkx",
  "seaborn",
  "ipython",
  "cycler",
  "imageio",
  "requests"
]
sonata = [
  "h5py>=3.8.0",
]
full = [
  # Examples dependencies
  "networkx", "seaborn", "ipython", "cycler", "imageio", "requests",
  # Sonata support
  "h5py>=3.8.0",
  # Additional tools
  "nestml", "nest-desktop",
  # Nest server dependencies
  "Flask", "flask-cors", "gunicorn", "requests", "RestrictedPython",
  # Development tools
  "jupyter", "jupyterlab", "notebook"
]

[project.urls]
Homepage = "https://nest-simulator.org/"
Documentation = "https://nest-simulator.readthedocs.io/en/stable/"
"Bug Tracker" = "https://github.com/nest/nest-simulator/issues"
Changelog = "https://nest-simulator.readthedocs.io/en/stable/whats_new/index.html"

[tool.scikit-build]
sdist.cmake = false
build-dir = "build/{wheel_tag}"
metadata.version.provider = "scikit_build_core.metadata.regex"
metadata.version.input = "VERSION"
metadata.version.regex = "(?P<value>.*)"
# Conditional exclusions based on package type
wheel.exclude = [
  ".git*",           # Always exclude git files
  ".github/",        # Always exclude CI configuration
  "build_support/",  # Always exclude build tools
  "docs/",           # Exclude docs from package
]

[tool.scikit-build.cmake.define]
with-optimize = "-O2"
with-warning = "ON"
with-python = "ON"
with-boost = "ON"
with-gsl = "ON"
with-openmp = "ON"

[tool.cibuildwheel]
build-frontend = "default"
build = ["cp39-*", "cp310-*", "cp311-*", "cp312-*", "cp313-*"]
skip = "*-win* *-manylinux_i686" # Skip
test-skip = ""
test-requires = [
  "isort",
  "junitparser",
  "matplotlib",
  "mypy",
  "numpy",
  "pandas",
  "pytest",
  "pytest-cov",
  "pytest-xdist",
  "scipy",
]
test-command = """
  python <<'EOF'
import nest
print(f'NEST {nest.__version__} imported successfully')
nest.ResetKernel()
print('NEST kernel reset successful')
n = nest.Create('iaf_psc_alpha')
print(f'Created neuron: {n}')
try:
    import nest.lib.hl_api_sonata
    print('Sonata support: AVAILABLE')
except ImportError:
    print('Sonata support: NOT AVAILABLE')
EOF
"""
archs = ["auto64"]
config-settings = {}
dependency-versions = "pinned"
environment-pass = ["CIBW_BUILD_VERBOSITY"]
build-verbosity = 1
before-all =  """
  set -e
  export MAKEFLAGS="-j2"
  NEST_SRC_DIR=${PWD}
  # Clean up any existing build artifacts
  rm -rf build/ *.so *.c 2>/dev/null || true

  # Install system dependencies
  if [[ "$OSTYPE" == "darwin"* ]]; then
    echo "=== macOS Build Setup ==="
    echo "Build OS: $OSTYPE"
    echo "Architecture: $(arch)"
    echo "Homebrew path: $(which brew)"

    # Determine Homebrew prefix based on architecture
    if [[ "$(arch)" == "arm64" ]]; then
      HOMEBREW_PREFIX="/opt/homebrew"
      echo "ARM64 detected - using $HOMEBREW_PREFIX"
    else
      HOMEBREW_PREFIX="/usr/local"
      echo "Intel detected - using $HOMEBREW_PREFIX"
    fi

    # Install dependencies
    echo "Installing dependencies with Homebrew..."
    brew update
    brew install llvm libomp boost gsl libtool cmake hdf5

    if ! brew install llvm libomp boost gsl libtool cmake hdf5; then
      echo "❌ Homebrew installation failed!"
      brew doctor
      exit 1
    fi

    # Verify installations
    echo "=== Verifying Homebrew installations ==="
    ls -la $HOMEBREW_PREFIX/lib/libomp* || echo "WARNING: libomp not found at $HOMEBREW_PREFIX/lib/"
    ls -la $HOMEBREW_PREFIX/lib/libboost* | head -3 || echo "WARNING: boost not found at $HOMEBREW_PREFIX/lib/"
    ls -la $HOMEBREW_PREFIX/lib/libhdf5* | head -3 || echo "WARNING: HDF5 not found at $HOMEBREW_PREFIX/lib/"

    # Set up environment for OpenMP and other libraries
    export LIBOMP_PATH="$HOMEBREW_PREFIX/opt/libomp"
    export CMAKE_PREFIX_PATH="$HOMEBREW_PREFIX:$LIBOMP_PATH:${CMAKE_PREFIX_PATH:-}"
    export PKG_CONFIG_PATH="$HOMEBREW_PREFIX/lib/pkgconfig:${PKG_CONFIG_PATH:-}"

    # OpenMP specific flags for Apple Clang
    export CPPFLAGS="-I$HOMEBREW_PREFIX/include -I$LIBOMP_PATH/include"
    export LDFLAGS="-L$HOMEBREW_PREFIX/lib -L$LIBOMP_PATH/lib"
    export DYLD_LIBRARY_PATH="$LIBOMP_PATH/lib:${DYLD_LIBRARY_PATH:-}"

    # CMake arguments for OpenMP detection
    export CMAKE_ARGS="\
      -DCMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH \
      -DCMAKE_C_FLAGS='-Xpreprocessor -fopenmp -I$LIBOMP_PATH/include' \
      -DCMAKE_CXX_FLAGS='-Xpreprocessor -fopenmp -I$LIBOMP_PATH/include' \
      -DCMAKE_EXE_LINKER_FLAGS='-L$LIBOMP_PATH/lib -lomp' \
      -DCMAKE_SHARED_LINKER_FLAGS='-L$LIBOMP_PATH/lib -lomp' \
      -DOpenMP_C_FLAGS='-Xpreprocessor -fopenmp' \
      -DOpenMP_C_LIB_NAMES='omp' \
      -DOpenMP_C_LIBRARIES='$LIBOMP_PATH/lib/libomp.dylib' \
      -DOpenMP_CXX_FLAGS='-Xpreprocessor -fopenmp' \
      -DOpenMP_CXX_LIB_NAMES='omp' \
      -DOpenMP_CXX_LIBRARIES='$LIBOMP_PATH/lib/libomp.dylib'"

    # Enable Sonata on macOS where HDF5 is available
    export NEST_ENABLE_SONATA=ON
    export CMAKE_ARGS="$CMAKE_ARGS -Dwith-hdf5=ON"

    echo "=== macOS Environment Summary ==="
    echo "HOMEBREW_PREFIX: $HOMEBREW_PREFIX"
    echo "LIBOMP_PATH: $LIBOMP_PATH"
    echo "CMAKE_PREFIX_PATH: $CMAKE_PREFIX_PATH"
    echo "CMAKE_ARGS: $CMAKE_ARGS"

    # Refresh PATH
    hash -r

  elif [ "${AUDITWHEEL_POLICY:-}" = "musllinux_1_2" ]; then
    apk add --no-cache git libc6-compat gsl gsl-dev wget bzip2 cmake boost-dev hdf5-dev
    # Enable Sonata on Alpine where HDF5 is available
    export NEST_ENABLE_SONATA=ON
    export CMAKE_ARGS="${CMAKE_ARGS} -Dwith-hdf5=ON"

  elif command -v yum >/dev/null 2>&1; then
    yum install -y git glibc glibc-devel gsl gsl-devel wget bzip2 cmake make gcc gcc-c++
    # Skip HDF5/Sonata on manylinux to avoid version conflicts
    export NEST_ENABLE_SONATA=OFF
    # Install boost from source on manylinux
    wget -q https://archives.boost.io/release/1.88.0/source/boost_1_88_0.tar.bz2
    tar --bzip2 -xf boost_1_88_0.tar.bz2
    cd boost_1_88_0
    ./bootstrap.sh --with-libraries=system,filesystem,program_options
    ./b2 -j2 --prefix=/usr/local install
    cd ..
    rm -rf boost_1_88_0*
    export CMAKE_ARGS="${CMAKE_ARGS} -Dwith-hdf5=OFF"

  elif command -v apt-get >/dev/null 2>&1; then
    apt-get update
    apt-get install -y git build-essential gsl-bin libgsl-dev wget bzip2 cmake libboost-all-dev libhdf5-dev
    # Enable Sonata on Debian/Ubuntu where HDF5 is available
    export NEST_ENABLE_SONATA=ON
    export CMAKE_ARGS="${CMAKE_ARGS} -Dwith-hdf5=ON"

  else
    echo "Unknown package manager, trying to continue..."
    export NEST_ENABLE_SONATA=OFF
    export CMAKE_ARGS="${CMAKE_ARGS} -Dwith-hdf5=OFF"
  fi

  echo "Final CMAKE_ARGS: $CMAKE_ARGS"
  """
# Only the images actually in use
container-engine = "docker"
manylinux-x86_64-image = "manylinux_2_28"
manylinux-aarch64-image = "manylinux_2_28"
musllinux-x86_64-image = "musllinux_1_2"
musllinux-aarch64-image = "musllinux_1_2"

[[tool.cibuildwheel.overrides]]
select = "*-macos*"
inherit.environment = "append"
environment = { MACOSX_DEPLOYMENT_TARGET = "15.0" }
test-requires = [
  "h5py>=3.8.0",
  "isort",
  "junitparser",
  "matplotlib",
  "mypy",
  "numpy",
  "pandas",
  "pytest",
  "pytest-cov",
  "pytest-xdist",
  "scipy",
]

[[tool.cibuildwheel.overrides]]
select = "*-musllinux*"
inherit.test-requires = "append"
test-requires = ["h5py>=3.8.0"]

[[tool.cibuildwheel.overrides]]
select = "*-manylinux_aarch64"
environment = { MAKEFLAGS = "-j1" }  # Reduce parallelism for ARM builds

[[tool.cibuildwheel.overrides]]
select = "*-manylinux_2_28*"
inherit.test-requires = "append"
test-requires = []  # No h5py for manylinux builds (no Sonata support)

[tool.cibuildwheel.linux]
repair-wheel-command = "auditwheel repair -w {dest_dir} {wheel}"

[tool.cibuildwheel.macos]
repair-wheel-command = "delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}"

[tool.isort]
profile = "black"
known_third_party = "nest"

[tool.black]
line-length = 120
