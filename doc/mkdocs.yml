site_name: NEST Developer Documentation
site_description: Developer documentation for NEST Simulator including architecture, design decisions, and roadmaps
site_url: https://nest-simulator.org/

repo_url: https://github.com/nest/nest-simulator
repo_name: nest-simulator

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Architecture:
      - architecture/index.md
  - Design Decisions:
      - design-decisions/index.md
  - Roadmaps:
      - roadmaps/index.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

plugins:
  - search:
      lang: en
