name: Build NEST simulator wheels

on:
  release:
    types: [published]
  workflow_dispatch:
  # Trigger on pull requests and pushes to main branches for testing
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ master, hep_pynest-ng ]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-15-intel, macos-15, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        with:
          package-dir: .
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    name: Upload wheels to pypi
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    if: (github.event_name == 'release' && github.event.action == 'published') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false
          verbose: true
          # only for test pypi
          repository-url: https://test.pypi.org/legacy/

  # Parallel build tests (don't wait for PyPI upload)
  test_build_artifacts:
    name: Test built wheels locally
    needs: [build_wheels]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-15, macos-latest, ubuntu-24.04, ubuntu-22.04]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-${{ matrix.os }}-*
          path: wheelhouse
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and test local wheel
        run: |
          # Find and install the wheel file
          # Instead of looking for 'wheelhouse', look for the actual artifact location
          # GitHub Actions downloads artifacts to the current directory with their artifact names

          # Find wheel files in downloaded artifacts
          wheel_file=$(find . -name "*.whl" -type f | head -1)

          # Alternative: if artifacts are in a specific subdirectory
          # wheel_file=$(find wheels-* -name "*.whl" 2>/dev/null | head -1)

          if [ -z "$wheel_file" ]; then
            echo "No wheel file found!"
            echo "Available files:"
            find . -name "*.whl" -type f 2>/dev/null || echo "No .whl files found"
            echo "Directory structure:"
            ls -la
            exit 1
          fi

          echo "Installing wheel: $wheel_file"
          python3 -m pip install --upgrade pip
          python3 -m pip install "$wheel_file"

          # Quick functionality test
          python3 -c "
          import nest
          import platform
          print(f'NEST {nest.__version__} on {platform.system()} {platform.machine()}')
          nest.ResetKernel()
          neurons = nest.Create('iaf_psc_alpha', 3)
          print(f'✓ Local wheel test passed: {len(neurons)} neurons created')
          "

  test_macos_specific:
    name: Test macOS-specific functionality
    needs: [upload_pypi]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-15, macos-latest, macos-15-intel]
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package from TestPyPI
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip --no-cache-dir install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple nest-simulator

      - name: Test NEST with macOS architecture info
        run: |
          python3 -c "
          import nest
          import platform
          import sys

          print(f'NEST {nest.__version__} on {platform.system()} {platform.release()}')
          print(f'Architecture: {platform.machine()}')
          print(f'Python: {sys.version}')

          # Test kernel and basic functionality
          nest.ResetKernel()
          print('✓ Kernel reset successful')

          # Test neuron creation
          neurons = nest.Create('iaf_psc_alpha', 8)
          print(f'✓ Created {len(neurons)} neurons')

          # Test devices
          vm = nest.Create('voltmeter')
          sg = nest.Create('spike_generator', params={'spike_times': [15.0, 35.0]})
          print('✓ Created devices')

          # Test connections and simulation
          nest.Connect(sg, neurons)
          nest.Connect(vm, neurons[:4])
          nest.Simulate(60.0)

          events = vm.events
          print(f'✓ Simulation complete: {len(events[\"times\"])} measurements')

          # Test Sonata on macOS (should be available)
          try:
              import nest.lib.hl_api_sonata
              print('✓ Sonata support: AVAILABLE (expected on macOS)')
          except ImportError:
              print('❌ Sonata support: NOT AVAILABLE (unexpected on macOS)')

          print(f'All macOS tests passed on {platform.machine()}!')
          "

  # PyPI-based tests (run after upload)
  test_uploaded_package:
    name: Test uploaded package on ${{ matrix.os }}
    needs: [upload_pypi]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name-suffix: "ubuntu"
          - os: ubuntu-latest
            container: debian:latest
            name-suffix: "debian"
          - os: ubuntu-latest
            container: alpine:latest
            name-suffix: "alpine"
          - os: ubuntu-latest
            container: centos:7
            name-suffix: "centos"
          - os: ubuntu-latest
            container: fedora:latest
            name-suffix: "fedora"
          - os: macos-15-intel
            name-suffix: "macos-intel"
          - os: macos-15
            name-suffix: "macos-arm"
    container: ${{ matrix.container }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.name-suffix || 'default' }}-pip-test-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.name-suffix || 'default' }}-pip-test-
            ${{ runner.os }}-pip-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          # Check if we're in a container (root user) or native runner (needs sudo)
          SUDO_CMD=""
          if [ "$EUID" -ne 0 ] && command -v sudo >/dev/null 2>&1; then
            SUDO_CMD="sudo"
          fi

          if command -v apt-get >/dev/null 2>&1; then
            $SUDO_CMD apt-get update
            $SUDO_CMD apt-get install -y python3 python3-pip openmpi-bin libopenmpi-dev
          elif command -v apk >/dev/null 2>&1; then
            $SUDO_CMD apk update
            $SUDO_CMD apk add python3 py3-pip openmpi openmpi-dev build-base
          elif command -v yum >/dev/null 2>&1; then
            $SUDO_CMD yum update -y
            $SUDO_CMD yum install -y python3 python3-pip openmpi-devel gcc-c++ make
          elif command -v dnf >/dev/null 2>&1; then
            $SUDO_CMD dnf update -y
            $SUDO_CMD dnf install -y python3 python3-pip openmpi-devel gcc-c++ make
          fi

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install open-mpi

      - name: Install and test package and multithreading
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple nest-simulator
          python -c "import nest; print('✓ NEST import successful:', nest.__version__)"
          python -c "
          import nest
          import time
          import os

          print('=== OpenMP Multithreading Test ===')

          # Set available threads
          max_threads = min(os.cpu_count() or 1, 4)  # Limit to 4 for CI
          nest.local_num_threads = max_threads

          print(f'Available CPU cores: {os.cpu_count()}')
          print(f'NEST threads set to: {nest.local_num_threads}')
          print(f'OpenMP max threads: {os.environ.get(\"OMP_NUM_THREADS\", \"not set\")}')

          # Simple network simulation to test threading
          nest.ResetKernel()

          # Create neurons
          n_neurons = 1000
          neurons = nest.Create('iaf_psc_alpha', n_neurons)

          # Create noise generator
          noise = nest.Create('poisson_generator', params={'rate': 1000.0})

          # Connect with some probability
          nest.Connect(noise, neurons, {'rule': 'pairwise_bernoulli', 'p': 0.1})
          nest.Connect(neurons, neurons, {'rule': 'pairwise_bernoulli', 'p': 0.01})

          # Record spikes
          spikedetector = nest.Create('spike_recorder')
          nest.Connect(neurons[:100], spikedetector)  # Record from subset

          print(f'Created network with {n_neurons} neurons')

          # Run simulation and measure time
          start_time = time.time()
          nest.Simulate(100.0)  # 100ms simulation
          end_time = time.time()

          # Get results
          events = nest.GetStatus(spikedetector, 'events')[0]
          n_spikes = len(events['times'])
          sim_time = end_time - start_time

          print(f'Simulation completed in {sim_time:.3f}s')
          print(f'Recorded {n_spikes} spikes')
          print(f'✓ OpenMP multithreading test successful!')

          # Verify we can actually use multiple threads
          if nest.local_num_threads > 1:
              print(f'✓ Multi-threading enabled with {nest.local_num_threads} threads')
          else:
              print('⚠ Running with single thread only')
          "
